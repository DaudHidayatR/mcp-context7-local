networks:
  egress:
    driver: bridge
  internal:
    driver: bridge
  split-arch:
    driver: bridge

volumes:
  chroma_data:
  postgres_data:

services:
  context7-gateway:
    build:
      context: .
      dockerfile: services/context7-gateway/Dockerfile
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.9}
    image: ${GATEWAY_IMAGE_NAME:-local/context7-gateway}:${GATEWAY_IMAGE_TAG:-1.0.31}
    environment:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
      CLIENT_IP_ENCRYPTION_KEY: ${CLIENT_IP_ENCRYPTION_KEY:-}
      GATEWAY_PORT: "3100"
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN:-}
      SESSION_TIMEOUT_MS: ${SESSION_TIMEOUT_MS:-300000}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-30000}
      CHILD_ENV_ALLOWLIST: ${CHILD_ENV_ALLOWLIST:-CONTEXT7_API_KEY,CLIENT_IP_ENCRYPTION_KEY}
      STDIO_CMD_JSON: ${STDIO_CMD_JSON:-}
    init: true
    networks:
      - internal
      - egress
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-3100}:3100"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  chromadb:
    image: docker.io/chromadb/chroma:1.5.3
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
      IS_PERSISTENT: "TRUE"
    networks:
      - internal
      - split-arch
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - chroma_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "/bin/bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/8000; printf 'GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3; head -n 1 <&3 | grep -q ' 200 '",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.9}
    image: ${RUNNER_IMAGE_NAME:-local/context7-runner}:${RUNNER_IMAGE_TAG:-1.0.0}
    environment:
      MCP_CONTEXT7_URL: ${MCP_CONTEXT7_URL:-http://context7-gateway:3100/mcp}
      MCP_CLOUDFLARE_URL: ${MCP_CLOUDFLARE_URL:-}
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN:-}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      CHROMA_URL: http://chromadb:8000
      RAG_COLLECTION: ${RAG_COLLECTION:-context7-local}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RUNNER_PORT: "3200"
      VPS_MEMORY_URL: ${VPS_MEMORY_URL:-http://memory-service:8082}
    depends_on:
      context7-gateway:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - internal
      - egress
      - split-arch
    ports:
      - "127.0.0.1:${RUNNER_HOST_PORT:-3200}:3200"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./memory:/app/memory
      - ./skills:/app/skills:ro
      - ./schemas:/app/schemas:ro
      - ./docs:/app/docs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3200/ready"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp_dev_password
      POSTGRES_DB: agent_memory
    networks:
      - split-arch
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d agent_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rag-service:
    build:
      context: ./services/rag
      dockerfile: Dockerfile
    environment:
      CHROMA_URL: http://chromadb:8000
      EMBED_URL: ${EMBED_URL:-http://host.docker.internal:11434}
      PORT: "8081"
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - split-arch
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  memory-service:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://mcp:mcp_dev_password@postgres:5432/agent_memory?sslmode=disable
      PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - split-arch
    ports:
      - "127.0.0.1:8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
