---
services:
  context7-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.9}
        CONTEXT7_VERSION: ${CONTEXT7_VERSION:-1.0.31}
    image: ${IMAGE_NAME:-local/context7-mcp}:${IMAGE_TAG:-1.0.31}
    environment:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
      CLIENT_IP_ENCRYPTION_KEY: ${CLIENT_IP_ENCRYPTION_KEY:-}
    stdin_open: true
    tty: false
    restart: "no"
    security_opt:
      - no-new-privileges:true
