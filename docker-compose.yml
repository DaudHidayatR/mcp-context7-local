# Split Architecture — Local Development
#
# This compose file runs the Go VPS services (rag + memory) alongside
# ChromaDB and Postgres for local development. It is separate from
# the existing compose.yml which runs the Bun-based platform.

networks:
  split-arch:
    driver: bridge

volumes:
  chroma_split_data:
  postgres_data:

services:
  # -----------------------------------------------------------------------
  # ChromaDB — vector database for RAG
  # -----------------------------------------------------------------------
  chromadb:
    image: docker.io/chromadb/chroma:1.5.3
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
      IS_PERSISTENT: "TRUE"
    networks:
      - split-arch
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    volumes:
      - chroma_split_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8000 && printf \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------------------
  # Postgres — persistence for agent memory
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp_dev_password
      POSTGRES_DB: agent_memory
    networks:
      - split-arch
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d agent_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------------------
  # RAG Service — Go HTTP server
  # -----------------------------------------------------------------------
  rag-service:
    build:
      context: ./services/rag
      dockerfile: Dockerfile
    environment:
      CHROMA_URL: http://chromadb:8000
      EMBED_URL: ${EMBED_URL:-http://host.docker.internal:11434}
      PORT: "8081"
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - split-arch
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # -----------------------------------------------------------------------
  # Memory Service — Go HTTP server
  # -----------------------------------------------------------------------
  memory-service:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://mcp:mcp_dev_password@postgres:5432/agent_memory?sslmode=disable
      PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - split-arch
    ports:
      - "127.0.0.1:8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
