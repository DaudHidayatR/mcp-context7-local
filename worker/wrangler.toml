name = "mcp-split-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "PRD_KV", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

[vars]
VPS_RAG_URL = "http://your-vps-ip:8081"
VPS_MEMORY_URL = "http://your-vps-ip:8082"

# SECRET is set via `wrangler secret put SECRET`
